name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        otp:
          - "28"

    env:
      PGDATABASE: postgres
      PGHOST: localhost
      PGPASSWORD: postgres
      PGUSER: postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python stdlib
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}

      - name: Export Python module paths
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os
          import sysconfig

          names = ("stdlib", "platstdlib", "purelib", "platlib")
          paths = [sysconfig.get_path(name) for name in names]
          paths = [path for path in dict.fromkeys(paths) if path and os.path.isdir(path)]
          print("PYTHONPATH=" + os.pathsep.join(paths))
          PY

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sqlite3 postgresql-client

      - name: Show tool versions
        run: |
          erl -noshell -eval 'io:format("OTP ~s~n", [erlang:system_info(otp_release)]), halt(0).'
          python - <<'PY'
          import sys
          import sysconfig

          print(sys.version)
          print("stdlib", sysconfig.get_path("stdlib"))
          PY
          sqlite3 --version
          psql --version

      - name: Run tests
        run: make test
